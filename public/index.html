<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Action RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }
    #gameContainer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

  <script src="js/config.js"></script>
  <script src="js/scenes/boot.js"></script>
  <script src="js/scenes/mainMenu.js"></script>
  <script src="js/scenes/settings.js"></script>
  <script src="js/scenes/gameScene.js"></script>
  <script src="js/scenes/pauseMenu.js"></script>
  <script src="js/scenes/gameOver.js"></script>
  <script src="js/scenes/levelComplete.js"></script>
  <script src="js/player.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/boss.js"></script>
  <script src="js/particleManager.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/saveData.js"></script>
  <script src="game.js"></script>

</html>
